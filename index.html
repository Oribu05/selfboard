<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="bg-slate-900 text-white">
    <section class="max-w-6xl mx-auto p-4 flex justify-between">
        <h3 class="text-2xl font-bold">My Dashboard</h3>
        <a href="https://github.com/oribu05" class="text-blue-500 hover:text-blue-400"><i
                class="ri-github-fill text-white text-2xl"></i></a>
    </section>

    <section class=" max-w-6xl mx-auto p-6" id="general">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:h-[300px]">

            <div class="h-[200px] md:h-full">
                <div id="weather" class="h-full"></div>
            </div>

            <div
                class="col-span-1 md:col-span-2 flex flex-col min-h-0 bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg shadow-black/20 p-4 rounded-2xl">

                <form id="task-form" class="flex gap-2 mb-3">
                    <input id="task-input"
                        class="flex-1 px-3 py-2 rounded-lg bg-white/5 border border-white/10 text-white placeholder-white/40 outline-none focus:border-blue-500/40 transition"
                        placeholder="Add task..." />

                    <button
                        class="px-4 py-2 bg-white/5 border border-white/10 hover:bg-white/10 text-white rounded-lg transition">
                        Add
                    </button>
                </form>

                <div class="relative flex-1 min-h-0">
                    <div id="todolist" class="h-full overflow-y-auto space-y-2 pr-1">
                    </div>

                    <div class="pointer-events-none absolute bottom-0 left-0 right-0 h-10
                    bg-gradient-to-t from-slate-950/80 to-transparent">
                    </div>
                </div>

            </div>

        </div>

    </section>
    <section class="max-w-6xl mx-auto px-6" id="charts">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div
                class="col-span-1 md:col-span-2 flex flex-col min-h-0 bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg shadow-black/20 p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-5">
                    <h3 id="chartTitle1" contenteditable="true"
                        class="text-white/80 font-medium outline-none border-b border-transparent focus:border-white/20 transition">
                        Add title to your graph...
                    </h3>
                    <div class="flex gap-2">
                        <input type="text" id="csvPath1" placeholder="file.csv" class="hidden bg-white/5 border border-white/10 rounded-md px-2 py-1 text-xs text-white/70 outline-none focus:border-blue-500/50 w-24 transition">
                        <button id="togglePath1" title="Link local file" class="text-white/40 hover:text-white/70 transition"><i class="ri-link"></i></button>
                        <label
                            class="cursor-pointer inline-flex items-center gap-1.5 bg-white/5 backdrop-blur border border-white/10 hover:bg-white/10 text-white/70 text-xs px-2.5 py-1 rounded-md transition">
                            Upload
                            <input type="file" id="csvInput" accept=".csv" class="hidden">
                        </label>
                    </div>
                </div>
                <div class="w-full h-[300px] relative flex items-center justify-center">
                    <div id="chartPlaceholder" class="text-white/40 text-sm">
                        Upload CSV file to see data
                    </div>
                    <canvas id="chartCanvas" class="hidden"></canvas>
                </div>
            </div>
            <div
                class="col-span-1 md:col-span-2 flex flex-col min-h-0 bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg shadow-black/20 p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-5">
                    <h3 id="chartTitle2" contenteditable="true"
                        class="text-white/80 font-medium outline-none border-b border-transparent focus:border-white/20 transition">
                        Add title to your graph...
                    </h3>
                    <div class="flex gap-2">
                        <input type="text" id="csvPath2" placeholder="file.csv" class="hidden bg-white/5 border border-white/10 rounded-md px-2 py-1 text-xs text-white/70 outline-none focus:border-blue-500/50 w-24 transition">
                        <button id="togglePath2" title="Link local file" class="text-white/40 hover:text-white/70 transition"><i class="ri-link"></i></button>
                        <label
                            class="cursor-pointer inline-flex items-center gap-1.5 bg-white/5 backdrop-blur border border-white/10 hover:bg-white/10 text-white/70 text-xs px-2.5 py-1 rounded-md transition">
                            Upload
                            <input type="file" id="csvInput2" accept=".csv" class="hidden">
                        </label>
                    </div>
                </div>
                <div class="w-full h-[300px] relative flex items-center justify-center">
                    <div id="chartPlaceholder2" class="text-white/40 text-sm">
                        Upload CSV file to see data
                    </div>
                    <canvas id="chartCanvas2" class="hidden"></canvas>
                </div>
            </div>
        </div>


    </section>

</body>

</html>
<script type="module" src="scripts/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
